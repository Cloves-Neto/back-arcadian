openapi: 3.0.0
info:
  title: Arcadian Hub API
  description: Backend API Documentation for Arcadian Hub (Auth, Admin and Client).
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        must_change_password:
          type: boolean
    Client:
      type: object
      properties:
        id:
          type: string
        profile_id:
          type: string
        company_name:
          type: string
        company_category:
          type: string
        service_ids:
          type: array
          items:
            type: string
    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        is_active:
          type: boolean
    Subscription:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        service_id:
          type: string
        status:
          type: string
    Log:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        details:
          type: string
        created_at:
          type: string
          format: date-time
    Stats:
      type: object
      properties:
        totalClients:
          type: number
        totalRevenue:
          type: number
        activeContracts:
          type: number
    Contract:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        total_amount:
          type: number
        start_date:
          type: string
          format: date
        status:
          type: string
    BillingInstallment:
      type: object
      properties:
        id:
          type: string
        contract_id:
          type: string
        amount:
          type: number
        due_date:
          type: string
          format: date
        status:
          type: string
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Login to the system
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
  /admin/users:
    get:
      summary: List all users
      tags:
        - Admin Users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          
    post:
      summary: Create a new user
      tags:
        - Admin Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - full_name
                - role
              properties:
                email:
                  type: string
                full_name:
                  type: string
                role:
                  type: string
                  enum: [admin, client]
      responses:
        '201':
          description: User created
  /admin/users/{id}:
    patch:
      summary: Update a user
      tags:
        - Admin Users
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User updated
    delete:
      summary: Delete a user
      tags:
        - Admin Users
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: User deleted
  /admin/invite:
    post:
      summary: Send an invitation
      tags:
        - Admin Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Invitation sent
  /auth/change-password:
    patch:
      summary: Change user password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed successfully
        '401':
          description: Unauthorized
        '400':
          description: Bad Request
  /auth/verify-token:
    get:
      summary: Verify invitation token
      tags:
        - Auth
      security: []
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: Invitation token to verify
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      email:
                        type: string
                      full_name:
                        type: string
        '400':
          description: Invalid or expired token
  /admin/clients:
    get:
      summary: List all clients
      tags:
        - Admin Clients
      responses:
        '200':
          description: A list of clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
    post:
      summary: Create a new client manually
      tags:
        - Admin Clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_name
              properties:
                company_name:
                  type: string
                company_category:
                  type: string
      responses:
        '201':
          description: Client created
  /admin/clients/{id}:
    patch:
      summary: Update a client
      tags:
        - Admin Clients
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name:
                  type: string
                company_category:
                  type: string
      responses:
        '200':
          description: Client updated
    delete:
      summary: Delete a client
      tags:
        - Admin Clients
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Client deleted
  /admin/services:
    get:
      summary: List all services
      tags:
        - Admin Services
      responses:
        '200':
          description: A list of services
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
    post:
      summary: Create a new service
      tags:
        - Admin Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
      responses:
        '201':
          description: Service created
  /admin/services/{id}:
    patch:
      summary: Update a service
      tags:
        - Admin Services
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                is_active:
                  type: boolean
      responses:
        '200':
          description: Service updated
    delete:
      summary: Delete a service
      tags:
        - Admin Services
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Service deleted
  /admin/contracts:
    get:
      summary: List all contracts
      tags:
        - Admin Contracts
      responses:
        '200':
          description: A list of contracts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
    post:
      summary: Create a new contract
      tags:
        - Admin Contracts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client_id
                - total_amount
              properties:
                client_id:
                  type: string
                total_amount:
                  type: number
      responses:
        '201':
          description: Contract created
  /admin/contracts/{id}:
    delete:
      summary: Delete a contract
      tags:
        - Admin Contracts
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Contract deleted
  /admin/billing:
    get:
      summary: List all billing installments
      tags:
        - Admin Billing
      responses:
        '200':
          description: A list of billing installments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingInstallment'
  /admin/billing/contracts/{contractId}/installments:
    get:
      summary: Get installments for a specific contract
      tags:
        - Admin Billing
      parameters:
        - in: path
          name: contractId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: A list of installments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingInstallment'
  /admin/billing/installments/{id}:
    patch:
      summary: Update billing installment status
      tags:
        - Admin Billing
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, paid, cancelled]
      responses:
        '200':
          description: Installment updated
  /admin/billing/installments/{id}/charge:
    post:
      summary: Charge a billing installment
      tags:
        - Admin Billing
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Installment charged
  /admin/stats:
    get:
      summary: Get admin statistics
      tags:
        - Admin Stats
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Stats'
  /admin/logs:
    get:
      summary: List activity logs
      tags:
        - Admin Logs
      responses:
        '200':
          description: Activity logs retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Log'
  /admin/subscriptions:
    get:
      summary: List all subscriptions
      tags:
        - Admin Subscriptions
      responses:
        '200':
          description: A list of subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
    post:
      summary: Create a new subscription
      tags:
        - Admin Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client_id
                - service_id
              properties:
                client_id:
                  type: string
                service_id:
                  type: string
      responses:
        '201':
          description: Subscription created
  /admin/subscriptions/{id}:
    patch:
      summary: Update a subscription
      tags:
        - Admin Subscriptions
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Subscription updated
    delete:
      summary: Delete a subscription
      tags:
        - Admin Subscriptions
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Subscription deleted
  /client/dashboard:
    get:
      summary: Get client dashboard data
      tags:
        - Client Dashboard
      responses:
        '200':
          description: Dashboard data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      active_contracts:
                        type: number
                      pending_installments:
                        type: number
                      total_paid:
                        type: number
  /client/profile:
    get:
      summary: Get current client profile
      tags:
        - Client Profile
      responses:
        '200':
          description: Client profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
    put:
      summary: Update client profile
      tags:
        - Client Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name:
                  type: string
                company_category:
                  type: string
      responses:
        '200':
          description: Client profile updated
  /profiles:
    get:
      summary: Get current user profile
      tags:
        - User Profile
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      full_name:
                        type: string
                      avatar_url:
                        type: string
    put:
      summary: Update user profile
      tags:
        - User Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                avatar_url:
                  type: string
      responses:
        '200':
          description: User profile updated
